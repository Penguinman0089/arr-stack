
#########################
# Optional NAS Utilities #
#########################
# These services are useful but not required for the media stack.
# Deploy with: docker compose -f docker-compose.utilities.yml up -d

#########################
# Volumes               #
#########################
volumes:
  duc-index:
  uptime-kuma-data:
  beszel-data:
  configarr-repos:
  tautulli-config:
  tailscale-data:
  homarr-config:
  homarr-data:
  landing-page:
  diun-data:

#########################
# Networks              #
#########################
networks:
  arr-stack:
    external: true

#########################
# Logging               #
#########################
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

#########################
# Services              #
#########################
services:
  # ═══════════════════════════════════════════════════════════════════════════
  # LANDING PAGE - "Get off my lawn" page for the root domain.
  # Access: penguinman0089.com (via Cloudflare Tunnel)
  # ═══════════════════════════════════════════════════════════════════════════
  landing-page:
    image: nginx:alpine
    container_name: landing-page
    restart: always
    networks:
      arr-stack:
        ipv4_address: 172.20.0.21
    volumes:
      - ./landing:/usr/share/nginx/html:ro
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════════════════
  # DEUNHEALTH - Auto-recovery for VPN failures. Watches gluetun health and
  # restarts dependent services (qBittorrent, Sonarr, etc.) when VPN recovers.
  # No web UI. Runs silently in background.
  # ═══════════════════════════════════════════════════════════════════════════
  deunhealth:
    image: qmcgaw/deunhealth:v0.3.0
    container_name: deunhealth
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
    restart: always
    logging: *default-logging
    healthcheck:
      test: ["CMD", "/app", "healthcheck"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════════════════
  # UPTIME KUMA - Monitoring dashboard. Shows health of all your services.
  # Access: uptime.lan | NAS_IP:3001 (LAN-only, use WireGuard for remote)
  # ═══════════════════════════════════════════════════════════════════════════
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: always
    ports:
      - "3001:3001"  # Local network access only
    environment:
      - TZ=${TZ}
    networks:
      arr-stack:
        ipv4_address: 172.20.0.13  # For monitoring other containers
    volumes:
      - uptime-kuma-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # For Docker container monitoring
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "node /app/extra/healthcheck.js"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # DUC - Disk usage analyzer. Visual treemap UI showing what's using storage.
  # Access: duc.lan | NAS_IP:8838 (LAN-only, use WireGuard for remote)
  # Note: Re-indexes daily at 4am. Manual: docker restart duc
  # ═══════════════════════════════════════════════════════════════════════════
  duc:
    image: mkoestler/duc-service:v1.1.0
    container_name: duc
    networks:
      arr-stack:
        ipv4_address: 172.20.0.14
    volumes:
      - /volume1:/scan/volume1:ro      # NAS data (read-only)
      - duc-index:/database            # Persistent index
    ports:
      - "8838:80"                      # Local network access only
    environment:
      - TZ=${TZ}
      - SCHEDULE=0 4 * * *             # Re-index daily at 4am
    restart: always
    logging: *default-logging

  # ═══════════════════════════════════════════════════════════════════════════
  # QBIT-SCHEDULER - Pauses torrents overnight to let disks spin down.
  # Default: pause at 20:00, resume at 06:00. No web UI.
  # ═══════════════════════════════════════════════════════════════════════════
  qbit-scheduler:
    build: ./scripts/qbit-scheduler
    container_name: qbit-scheduler
    environment:
      - TZ=${TZ}
      - QBIT_HOST=${NAS_IP}
      - QBIT_PORT=8085
      - QBIT_USER=${QBIT_USER}
      - QBIT_PASS=${QBIT_PASSWORD}
      - PAUSE_HOUR=${QBIT_PAUSE_HOUR}
      - RESUME_HOUR=${QBIT_RESUME_HOUR}
    restart: always
    logging: *default-logging

  # ═══════════════════════════════════════════════════════════════════════════
  # BESZEL - Lightweight server monitoring with historical data and alerts.
  # Access: beszel.lan | NAS_IP:8090 (LAN-only, use WireGuard for remote)
  # ═══════════════════════════════════════════════════════════════════════════
  beszel:
    image: henrygd/beszel:0.18
    container_name: beszel
    restart: always
    ports:
      - "8090:8090"
    networks:
      arr-stack:
        ipv4_address: 172.20.0.15
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - beszel-data:/beszel_data
    environment:
      - TZ=${TZ}
    logging: *default-logging
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  beszel-agent:
    image: henrygd/beszel-agent:0.18
    container_name: beszel-agent
    restart: always
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PORT=45876
      - KEY=${BESZEL_KEY}
    logging: *default-logging
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ═══════════════════════════════════════════════════════════════════════════
  # DIUN - Docker Image Update Notifier. Monitors running containers and
  # checks registries for newer image versions. Sends webhook notifications
  # (e.g. to Home Assistant) when updates are available. Does NOT auto-update.
  # UGOS handles actual updates natively: Docker → Management → Image update.
  # No web UI. Daily check at 6am by default (configurable via DIUN_SCHEDULE).
  # ═══════════════════════════════════════════════════════════════════════════
  diun:
    image: crazymax/diun:4.31.0
    container_name: diun
    restart: always
    command: serve
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - diun-data:/data
    networks:
      arr-stack:
        ipv4_address: 172.20.0.16
    environment:
      - TZ=${TZ}
      - DIUN_WATCH_WORKERS=10
      - DIUN_WATCH_SCHEDULE=${DIUN_SCHEDULE:-0 6 * * *}
      - DIUN_PROVIDERS_DOCKER=true
      - DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=true
      - DIUN_NOTIF_WEBHOOK_ENDPOINT=${DIUN_WEBHOOK_URL:-}
      - DIUN_NOTIF_WEBHOOK_METHOD=POST
      - DIUN_NOTIF_WEBHOOK_CONTENTTYPE=application/json
    logging: *default-logging

  # ═══════════════════════════════════════════════════════════════════════════
  # TAUTULLI - Plex monitoring and analytics. Track watch history, user stats,
  # streaming quality, and library growth. Connects to Plex via API.
  # Access: tautulli.lan | NAS_IP:8181 (LAN-only)
  # ═══════════════════════════════════════════════════════════════════════════
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    restart: always
    ports:
      - "8181:8181"
    networks:
      arr-stack:
        ipv4_address: 172.20.0.17
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - tautulli-config:/config
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sSf", "http://localhost:8181/status", "-o", "/dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # TAILSCALE - VPN mesh network. Provides secure remote access to NAS and
  # admin UIs without exposing ports. Access all services via Tailscale IP.
  # No web UI on NAS — manage at https://login.tailscale.com
  # ═══════════════════════════════════════════════════════════════════════════
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: always
    hostname: ${TAILSCALE_HOSTNAME:-nas}
    networks:
      arr-stack:
        ipv4_address: 172.20.0.18
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_ACCEPT_DNS=false
      - TS_EXTRA_ARGS=--reset --accept-routes --advertise-exit-node --advertise-routes=172.20.0.0/24,192.168.1.0/24
    volumes:
      - tailscale-data:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    logging: *default-logging

  # ═══════════════════════════════════════════════════════════════════════════
  # HOMARR - Service dashboard/homepage. Quick-access to all your services.
  # Access: homarr.lan | NAS_IP:7575 (LAN-only)
  # ═══════════════════════════════════════════════════════════════════════════
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: always
    ports:
      - "7575:7575"
    networks:
      arr-stack:
        ipv4_address: 172.20.0.19
    environment:
      - TZ=${TZ}
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_KEY}
    volumes:
      - homarr-config:/appdata/configs
      - homarr-data:/appdata/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7575"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # CONFIGARR - Syncs TRaSH Guides quality profiles and custom formats to
  # Sonarr/Radarr. One-shot job: runs once and exits. No web UI.
  # Run manually: docker compose -f docker-compose.utilities.yml run --rm configarr
  # Dry run first: docker compose -f docker-compose.utilities.yml run --rm -e DRY_RUN=true configarr
  # ═══════════════════════════════════════════════════════════════════════════
  configarr:
    image: ghcr.io/raydak-labs/configarr:1.23.0
    container_name: configarr
    restart: "no"
    networks:
      - arr-stack
    volumes:
      - ./configarr/config.yml:/app/config/config.yml:ro
      - configarr-repos:/app/repos
    environment:
      - TZ=${TZ}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
    logging: *default-logging
